openapi: 3.0.0
info:
  version: 1.0.0
  title: NNIKITI API
  description: This is an API for the educational institution's information system.

servers:
  - url: http://127.0.0.1:8000/api/v1/
    description: Local development

tags:
  - name: auth
    description: Auth endpoints
  - name: users
    description: Users endpoints
  - name: core
    description: Core endpoints
  - name: events
    description: Events endpoints
  - name: departments
    description: Departments endpoints
  - name: gallery
    description: Gallery endpoints

paths:
  /core/main-slider-items/:
    get:
      tags:
        - core
      summary: Returns a list of slider images.
      description: Returns a list of slider images
      responses:
        "200":
          description: Successfully returned a list of slider images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MainSliderItem"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/statistic-block/:
    get:
      tags:
        - core
      summary: Returns a list of data for the statistic block.
      description: Returns a list of data for statistic block
      responses:
        "200":
          description: Successfully returned a list of data for statictic block
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatisticBlock"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/partners/:
    get:
      tags:
        - core
      summary: Returns a list of partners.
      description: Returns a list of data for partners block
      responses:
        "200":
          description: Successfully returned a list of data for partners block
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partners"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/faq/:
    get:
      tags:
        - core
      summary: Returns a list of FAQs (questions and answers).
      description: Returns a list of data for the FAQ block
      responses:
        "200":
          description: Successfully returned a list of data for the FAQ block
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FAQs"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/educational-programs/:
    get:
      tags:
        - core
      summary: Returns a list of educational programs.
      description: Returns a list of data for the edu-programs block.
      responses:
        "200":
          description: Successfully returned a list of data for the edu-programs block
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EducationalProgram"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/alumni/:
    get:
      tags:
        - core
      summary: Returns a list of Alumni
      description: Returns a list of Alumni, optionally filtered by graduation year
      parameters:
        - in: query
          name: year
          schema:
            type: integer
            example: 2024
          description: Graduation year to filter alumni
          required: false
      responses:
        "200":
          description: Successfully returned a list of Alumni
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alumnus"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - core
      summary: Подати заявку випускника
      description: >
        Публічна форма для випускників. Запис створюється зі статусом `DRAFT`
        і потребує модерації адміністратором перед публікацією.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [first_name, last_name, graduation_year, major]
              properties:
                first_name:
                  type: string
                  example: "Іван"
                  description: Ім'я випускника
                last_name:
                  type: string
                  example: "Іваненко"
                  description: Прізвище випускника
                graduation_year:
                  type: integer
                  example: 2024
                  description: Рік випуску
                major:
                  type: string
                  example: "122 — Комп'ютерні науки"
                  description: Спеціальність
                text:
                  type: string
                  example: "Зараз працюю в Google як Software Engineer"
                  description: Ваша історія (необов'язково)
                image:
                  type: string
                  format: binary
                  description: Фото (необов'язково)
      responses:
        "201":
          description: Заявку успішно подано
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 123
        "400":
          description: Невалідні дані
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/alumni/years/:
    get:
      tags:
        - core
      summary: Returns a list of graduation years
      description: Returns a list of graduation years
      responses:
        "200":
          description: Successfully returned a list of alumni
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                  example: 2024, 2025
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/alumni-slider-items/:
    get:
      tags:
        - core
      summary: Returns a list of alumni slider objects.
      description: Returns a list of alumni slider objects
      responses:
        "200":
          description: Successfully returned a list of slider images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlumniSliderItem"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/google/:
    post:
      tags:
        - auth
      summary: Login using Google OAuth2 with PKCE
      description: >
        1) Send JSON body with:
           - `code` (authorization code received from Google after redirect)
           - `code_verifier` (PKCE code verifier generated on frontend)
        2) Backend exchanges the `code` and `code_verifier` for Google access token.
        
        3) User is created or updated in the local database, and app-specific access and refresh tokens are generated.
        
        4) **Access token is returned in the JSON response body.**
        
        5) **Refresh token is set as a secure HttpOnly cookie named `refresh_token`.**
        *This endpoint does NOT require an Authorization header (no token required) since it is the login endpoint.*
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ code, code_verifier ]
              properties:
                code:
                  type: string
                  description: Authorization code received from Google (provided by frontend)
                code_verifier:
                  type: string
                  description: PKCE code verifier matching the code_challenge sent initially
      responses:
        "200":
          description: Successfully authenticated, tokens issued
          headers:
            Set-Cookie:
              description: Refresh token is set in a HttpOnly, Secure cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: OAuth2 access token to use in Authorization header
                  expires_in:
                    type: integer
                    description: Access token lifetime in seconds
                  token_type:
                    type: string
                    example: Bearer
        "400":
          description: Missing code or code_verifier, or Google token exchange error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/token/:
    post:
      tags:
        - auth
      summary: Refresh access token using refresh_token cookie
      description: >
        1) Send POST with body:
           - `client_id=client_id`
           - `grant_type=refresh_token`
        
        2) **Refresh token is NOT sent in the body; it is automatically read from the HttpOnly cookie `refresh_token`.**
        
        3) If the refresh token is valid, a new access token is returned in the response body.
        
        4) A new refresh token cookie is also set to replace the old one.
        *This endpoint does NOT require an Authorization header because refresh token is taken from the cookie.*
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [ client_id ,grant_type ]
              properties:
                client_id:
                  type: string
                  enum: [client_id]
                  description: Client token from API
                grant_type:
                  type: string
                  enum: [ refresh_token ]
                  description: Must be exactly `refresh_token`
      responses:
        "200":
          description: Access token successfully refreshed
          headers:
            Set-Cookie:
              description: Updated refresh token set in cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: New access token
                  expires_in:
                    type: integer
                    description: Access token lifetime in seconds
                  token_type:
                    type: string
                    example: Bearer
        "400":
          description: Invalid request or missing/invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me/:
    get:
      tags:
        - users
      summary: Get current authenticated user information
      description: >
        Returns information about the currently authenticated user.  
        Requires a valid `access` token via Authorization header.
      security:
        - AccessTokenAuth: []
      responses:
        "200":
          description: Successfully returned user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized or token missing/invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error during profile fetching
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/role/:
    get:
      tags:
        - users
      summary: Get current user role
      description: Returns information about role current user. (Required `access` token in headers for auth user)
      responses:
        "200":
          description: Successfully returned information
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  role:
                    type: string
              examples:
                guest:
                  summary: Guest
                  value:
                    id: null
                    role: GU
                student:
                  summary: Student
                  value:
                    id: 42
                    role: ST
                teacher:
                  summary: Teacher
                  value:
                    id: 1
                    role: TE
                data_operator:
                  summary: Data Operator
                  value:
                    id: 4
                    role: OP
        "401":
          description: Unauthorized or token missing/invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /events/:
    get:
      tags:
        - events
      summary: Returns a list of events.
      description: Returns list of the events.
      responses:
        "200":
          description: Event list successfully returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Events"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
  /events/{id}/:
    get:
      tags:
        - events
      summary: Returns details of a single event by its unique ID.
      description: Returns a single event object by its unique ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the event
          schema:
            type: integer
      responses:
        "200":
          description: Event object successfully returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Events"
        "400":
          description: Bad request (invalid ID or malformed request)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
  /gallery/albums/:
    get:
      tags:
        - gallery
      summary: Список альбомів
      description: Повертає опубліковані альбоми. Фільтри — `?year=`, `?year_from=`, `?year_to=`.
      parameters:
        - in: query
          name: year
          schema:
            type: integer
          required: false
          description: Фільтр за конкретним роком
        - in: query
          name: year_from
          schema:
            type: integer
          required: false
          description: Фільтр від року (включно)
        - in: query
          name: year_to
          schema:
            type: integer
          required: false
          description: Фільтр до року (включно)
      responses:
        "200":
          description: Список альбомів успішно повернуто
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
  /gallery/albums/{id}/:
    get:
      tags:
        - gallery
      summary: Деталі альбому
      description: Повертає альбом з усіма фото.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Альбом успішно повернуто
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumDetail"
        "404":
          description: Альбом не знайдено

  /departments/:
    get:
      tags:
        - departments
      summary: Returns a list of departments
      description: Returns a list of departments
      responses:
        "200":
          description: Departments list successfully returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Departments"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
  /departments/staff/:
    get:
      tags:
        - departments
      summary: Повертає весь персонал (викладачі + завідувачі кафедр)
      description: >
        Повертає об'єднаний список усіх завідувачів кафедр та викладачів.
        Поле `type` = `"head"` або `"faculty"`.
        Необов'язковий фільтр `?department=<id>` звужує результат до однієї кафедри.
      parameters:
        - in: query
          name: department
          schema:
            type: integer
          required: false
          description: ID кафедри для фільтрації
      responses:
        "200":
          description: Список персоналу успішно повернуто
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /departments/{id}/:
    get:
      tags:
        - departments
      summary: Returns details of a single department by its unique ID.
      description: Returns a single department object by its unique ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the event
          schema:
            type: integer
      responses:
        "200":
          description: Department object successfully returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentDetail"
        "400":
          description: Bad request (invalid ID or malformed request)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
components:
  securitySchemes:
    AccessTokenAuth:
      type: http
      scheme: bearer

  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Human readable error message
      required:
        - code
        - message

    MainSliderItem:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        image:
          title: Image
          type: string
          format: uri
          readOnly: true
    StatisticBlock:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        title:
          title: Title
          type: string
          readOnly: True
        description:
          title: Description
          type: string
          readOnly: True
        start_value:
          title: Start Value
          type: integer
          readOnly: True
        order:
          title: Order
          type: integer
          readOnly: True
    User:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        first_name:
          title: First name
          type: string
          readOnly: true
        last_name:
          title: Last name
          type: string
          readOnly: true
        email:
          title: Email
          type: string
          format: email
          readOnly: true
        avatar:
          title: Avatar
          type: string
          format: uri
          readOnly: true
    EventImage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
          type: string
          format: uri

    Events:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        title:
          type: string
          description: Event title (translated)
        slug:
          type: string
          readOnly: true
        body:
          type: string
          description: Event body in Markdown (translated)
        body_html:
          type: string
          description: Event body rendered as HTML
          readOnly: true
        cover:
          type: string
          format: uri
          nullable: true
          description: Cover image URL
        images:
          type: array
          description: All additional images of the event
          items:
            $ref: "#/components/schemas/EventImage"
        event_date:
          type: string
          format: date
          nullable: true
          description: Date when the event takes place (null for news/publications)
        location:
          type: string
          description: Location of the event (empty for news/publications)
        category:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
              description: Category name (translated) — e.g. Новини, Публікації, Події
            rgb_color:
              type: string
              example: "(59,130,246,0.15)"
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    Partners:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        name:
          title: Name
          type: string
          readOnly: true
        image:
          title: Image
          type: string
          format: uri
          readOnly: true
        site_url:
          title: Site url
          type: string
          format: uri
          readOnly: true
    FAQs:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        question:
          title: Question
          type: string
          readOnly: true
        answer:
          title: Question
          type: string
          readOnly: true
    CategorizedTag:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
    EducationalProgram:
      type: object
      properties:
        id:
          type: integer
          title: ID
          readOnly: true
        code:
          type: string
          title: Program code
        name:
          type: string
          title: Educational program name
        subject:
          type: array
          title: Subjects
          readOnly: true
          items:
            $ref: '#/components/schemas/CategorizedTag'
        education_forms:
          type: array
          title: Education Forms
          readOnly: true
          items:
            $ref: '#/components/schemas/CategorizedTag'
        education_levels:
          type: array
          title: Education Levels
          readOnly: true
          items:
            $ref: '#/components/schemas/CategorizedTag'
    ProgramSubject:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Subject name (translated)

    FacultyMember:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Full name (language-dependent)
        role:
          type: string
          description: Role/position (language-dependent)
        specialty:
          type: string
          description: Specialty (language-dependent)
        image:
          type: string
          format: uri
          nullable: true
        email:
          type: string
          format: email
        audience:
          type: string

    HeadOfDepartment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          description: Full name (language-dependent)
        regalia:
          type: string
          description: Academic title/regalia (language-dependent)
        email:
          type: string
          format: email
          nullable: true
        audience:
          type: string
          nullable: true

    DepartmentHistory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        year:
          type: string
          description: "Year or period label, e.g. '2004', '1970-ті', 'Сьогодні'"
        text:
          type: string
          description: Description of the historical event (translated)

    EducationalProgramFull:
      allOf:
        - $ref: '#/components/schemas/EducationalProgram'
        - type: object
          properties:
            description:
              type: string
              description: Translated description
            degree:
              type: string
              description: "e.g. 'Бакалавр', 'Магістр'"
            form:
              type: string
              description: "e.g. 'Денна, заочна, дуальна'"
            duration:
              type: integer
              nullable: true
              description: Duration in years
            total_credits:
              type: integer
              nullable: true
              description: Total ECTS credits
            budget_seats:
              type: integer
              nullable: true
            contract_seats:
              type: integer
              nullable: true
            subjects:
              type: array
              items:
                $ref: '#/components/schemas/ProgramSubject'
            bachelor:
              type: object
              nullable: true
              properties:
                code:
                  type: string
                specialty:
                  type: string
                program:
                  type: string
            magistracy:
              type: object
              nullable: true
              properties:
                code:
                  type: string
                specialty:
                  type: string
                program:
                  type: string
            postgraduate:
              type: object
              nullable: true
              properties:
                code:
                  type: string
                specialty:
                  type: string
                program:
                  type: string

    Departments:
      type: object
      properties:
        id:
          type: integer
          title: ID
          readOnly: true
        name:
          type: string
          title: Department name

    DepartmentDetail:
      type: object
      properties:
        id:
          type: integer
          title: ID
          readOnly: true
        name:
          type: string
          description: Translated name of the department
        description:
          type: string
          description: Translated description of the department
        address:
          type: string
          description: Translated address of the department
        email:
          type: string
          format: email
        image:
          type: string
          format: uri
          nullable: true
          description: Department group photo
        room:
          type: string
          description: Department room number
        head_of_department:
          type: array
          items:
            $ref: '#/components/schemas/HeadOfDepartment'
        team:
          type: array
          description: Faculty members of the department
          items:
            $ref: '#/components/schemas/FacultyMember'
        educational_program:
          type: array
          items:
            $ref: '#/components/schemas/EducationalProgramFull'
        history:
          type: array
          description: Chronological history of the department
          items:
            $ref: '#/components/schemas/DepartmentHistory'
    StaffMember:
      type: object
      description: >
        Уніфікований об'єкт персоналу. Поле `type` визначає тип:
        `"head"` — завідувач кафедри, `"faculty"` — викладач.
      properties:
        id:
          type: integer
          readOnly: true
        type:
          type: string
          enum: [head, faculty]
          description: Тип запису
        full_name:
          type: string
          description: ПІБ завідувача (тільки для type=head, мовозалежне)
        name:
          type: string
          description: ПІБ викладача (тільки для type=faculty, мовозалежне)
        regalia:
          type: string
          description: Науковий ступінь/звання (тільки для type=head, мовозалежне)
          nullable: true
        role:
          type: string
          description: Посада викладача (тільки для type=faculty, мовозалежне)
          nullable: true
        specialty:
          type: string
          description: Спеціальність викладача (тільки для type=faculty, мовозалежне)
          nullable: true
        image:
          type: string
          format: uri
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        audience:
          type: string
          nullable: true
        department_id:
          type: integer
          description: ID кафедри

    Alumnus:
      type: object
      properties:
        id:
          type: integer
          title: ID
          readOnly: true
        full_name:
          type: string
          title: Full name
          readOnly: true
        text:
          type: string
          title: About student
          readOnly: true
        image:
          type: string
          format: uri
          readOnly: true
        created_at:
          type: string
          format: date-time
          title: Created at
          readOnly: true
        date_of_graduation:
          type: string
          format: date
          title: Date of graduation
          readOnly: true
        links:
          type: object
          title: Social links or publications
          description: Dictionary of social/profile links
          additionalProperties:
            type: string
            format: uri
          example:
            instagram: "https://instagram.com/example"
            telegram: "https://t.me/example"
            facebook: "https://facebook.com/example"
        major:
          type: string
          readOnly: true
        degree:
          type: string
          readOnly: true
        workplace:
          type: string
          readOnly: true
        position:
          type: string
          readOnly: true
    AlbumPhoto:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
          type: string
          format: uri
        published_at:
          type: string
          format: date
        order:
          type: integer

    Album:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          description: Назва альбому (мовозалежна)
        description:
          type: string
          description: Опис альбому (мовозалежний)
        cover:
          type: string
          format: uri
          nullable: true
        date:
          type: string
          format: date
        status:
          type: string
          enum: [DF, PB]
          description: "DF = Draft, PB = Published"

    AlbumDetail:
      allOf:
        - $ref: '#/components/schemas/Album'
        - type: object
          properties:
            photos:
              type: array
              items:
                $ref: '#/components/schemas/AlbumPhoto'

    AlumniSliderItem:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        image:
          title: Image
          type: string
          format: uri
          readOnly: true

