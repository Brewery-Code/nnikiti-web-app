openapi: 3.0.0
info:
  version: 1.0.0
  title: NNIKITI API
  description: This is an API for the educational institution's information system.

servers:
  - url: http://127.0.0.1:8000/api/v1/
    description: Local development

tags:
  - name: auth
    description: Auth endpoints
  - name: users
    description: Users endpoints
  - name: core
    description: Core endpoints
  - name: events
    description: Events endpoints

paths:
  /core/main-slider-item/:
    get:
      tags:
        - core
      summary: Returns a list of slider images.
      description: Returns a list of slider images
      responses:
        "200":
          description: Successfully returned a list of slider images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MainSliderItem"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/statistic-block/:
    get:
      tags:
        - core
      summary: Returns a list of data for the statistic block.
      description: Returns a list of data for statistic block
      responses:
        "200":
          description: Successfully returned a list of data for statictic block
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatisticBlock"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/partners/:
    get:
      tags:
        - core
      summary: Returns a list of partners.
      description: Returns a list of data for partners block
      responses:
        "200":
          description: Successfully returned a list of data for partners block
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partners"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /core/faq/:
    get:
      tags:
        - core
      summary: Returns a list of FAQs (questions and answers).
      description: Returns a list of data for the FAQ block
      responses:
        "200":
          description: Successfully returned a list of data for the FAQ block
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FAQs"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/google/:
    post:
      tags:
        - auth
      summary: Login using Google OAuth2 with PKCE
      description: >
        Exchanges authorization `code` and `code_verifier` with Google and returns access token (in body)
        and sets refresh token as HttpOnly cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ code, code_verifier ]
              properties:
                code:
                  type: string
                code_verifier:
                  type: string
      responses:
        "200":
          description: Authenticated and tokens issued
          headers:
            Set-Cookie:
              description: Refresh token is set in a cookie named `refresh_token`
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                  token_type:
                    type: string
        "400":
          description: Missing code or code_verifier, or Google exchange error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/token/:
    post:
      tags:
         - auth
      summary: Refresh access token using refresh_token cookie
      description: >
        Uses `refresh_token` stored in HttpOnly cookie to issue a new access token.  
        Requires `grant_type=refresh_token` in POST body.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum: [ refresh_token ]
      responses:
        "200":
          description: Access token successfully refreshed
          headers:
            Set-Cookie:
              description: New refresh_token set in cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                  token_type:
                    type: string
        "400":
          description: Invalid request or missing refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me/:
    get:
      tags:
        - users
      summary: Get current authenticated user information
      description: >
        Returns information about the currently authenticated user.  
        Requires a valid access token (e.g., via Authorization header or cookie).
      security:
        - JWTAuthCookies: [ ]
      responses:
        "200":
          description: Successfully returned user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized or token missing/invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error during profile fetching
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /events/:
    get:
      tags:
        - events
      summary: Returns a list of events.
      description: Returns list of the events.
      responses:
        "200":
          description: Event list successfully returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Events"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
  /events/{id}/:
    get:
      tags:
        - events
      summary: Returns details of a single event by its unique ID.
      description: Returns a single event object by its unique ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the event
          schema:
            type: integer
      responses:
        "200":
          description: Event object successfully returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Events"
        "400":
          description: Bad request (invalid ID or malformed request)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
components:
  securitySchemes:
    JWTAuthCookies:
      type: apiKey
      in: cookie
      name: access_token

  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Human readable error message
      required:
        - code
        - message

    MainSliderItem:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        image:
          title: Image
          type: string
          format: uri
          readOnly: true
    StatisticBlock:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        title:
          title: Title
          type: string
          readOnly: True
        description:
          title: Description
          type: string
          readOnly: True
        start_value:
          title: Start Value
          type: integer
          readOnly: True
        order:
          title: Order
          type: integer
          readOnly: True
    User:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        first_name:
          title: First name
          type: string
          readOnly: true
        last_name:
          title: Last name
          type: string
          readOnly: true
        email:
          title: Email
          type: string
          format: email
          readOnly: true
        avatar:
          title: Avatar
          type: string
          format: uri
          readOnly: true
    Events:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        title:
          title: Title
          type: string
          readOnly: true
        body:
          title: Body
          type: string
          readOnly: true
        body_html:
          title: HTML Body
          type: string
          readOnly: true
        category:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            rgb_color:
              type: string
              example: "(244,255,244,0.1)"
        created_at:
          type: string
          format: date-time
          example: "2025-06-30T11:39:01.957067Z"
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: "2025-06-30T12:10:46.028492Z"
          readOnly: true
    Partners:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        name:
          title: Name
          type: string
          readOnly: true
        image:
          title: Image
          type: string
          format: uri
          readOnly: true
        site_url:
          title: Site url
          type: string
          format: uri
          readOnly: true
    FAQs:
      type: object
      properties:
        id:
          title: ID
          type: integer
          readOnly: true
        question:
          title: Question
          type: string
          readOnly: true
        answer:
          title: Question
          type: string
          readOnly: true
